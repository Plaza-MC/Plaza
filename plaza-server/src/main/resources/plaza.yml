#
# Options in this file are wired into the server. When a new section is still
# being implemented it will be marked with [WIP]; otherwise the flag is applied
# immediately after a reload or restart.

# Internal version. Do not change manually; it is used to migrate the file
# format when Plaza is updated.
config-version: 5

# ---------------------------------------------------------------------------
# Plaza Worlds
# ---------------------------------------------------------------------------
# All world-related configuration lives under this section. Plaza replaces
# the default Bukkit/Paper world backend with Slime Worlds unless configured
# otherwise, so lobby and minigame servers do not pay for vanilla terrain
# generation or simulation they do not need.
# ---------------------------------------------------------------------------
plaza-worlds:

  # Default world format for worlds created or loaded through Plaza.
  # Supported values: SLIME, ANVIL.
  # SLIME  - in-memory, resettable, plugin-friendly (recommended).
  # ANVIL  - standard Minecraft region files (slower, for compatibility).
  default-format: SLIME

  # Default data source for worlds that do not specify one.
  # The source key must match an entry in plaza-worlds.sources.
  default-source: file

  # -------------------------------------------------------------------------
  # World formats
  # -------------------------------------------------------------------------
  formats:

    # SLIME format options.
    slime:
      # Biome used for void/empty SLIME worlds.
      default-biome: minecraft:plains
      # Whether SLIME worlds are read-only by default.
      read-only: false
      # Save POI data (villager job sites, beds, etc.).
      save-poi: true
      # Save scheduled block ticks (e.g. delayed redstone).
      save-block-ticks: false
      # Save scheduled fluid ticks.
      save-fluid-ticks: false

    # ANVIL format options.
    anvil:
      # Allow loading vanilla/ANVIL worlds through Plaza.
      enabled: false

  # -------------------------------------------------------------------------
  # World sources
  # -------------------------------------------------------------------------
  # Sources are named storage backends. The 'type' field selects the loader.
  # You can add as many sources as you want and reference them per-world.
  # -------------------------------------------------------------------------
  sources:

    # File-based storage. This is the baseline and does not require any
    # external service.
    file:
      type: file
      # Folder where .slime/.anvil world files are stored.
      path: plaza_worlds

    # SQL source (MySQL/MariaDB/PostgreSQL via JDBC).
    # Disabled by default; enable only when configured.
    sql:
      type: sql
      enabled: false
      dialect: mysql
      host: 127.0.0.1
      port: 3306
      database: plazamc
      username: plazamc
      password: ""
      use-ssl: false
      table: worlds

    # MongoDB source.
    # Disabled by default; enable only when configured.
    mongodb:
      type: mongodb
      enabled: false
      # If set, this URI overrides host/port/database/auth-source.
      uri: ""
      host: 127.0.0.1
      port: 27017
      database: plazamc
      collection: worlds
      username: ""
      password: ""
      auth-source: admin

  # -------------------------------------------------------------------------
  # Spawn platform
  # -------------------------------------------------------------------------
  # Plaza void worlds have no terrain. The spawn platform guarantees players
  # have a safe block to stand on when they join or teleport to a void world.
  # -------------------------------------------------------------------------
  spawn-platform:
    enabled: true

  # -------------------------------------------------------------------------
  # Dynamic world border
  # -------------------------------------------------------------------------
  # Automatically shrinks the world border so it tightly fits the loaded world
  # data. This hides the ugly void edge on void/lobby maps.
  # -------------------------------------------------------------------------
  dynamic-world-border:
    enabled: true
    # Extra blocks to add around the discovered bounds.
    margin-blocks: 8
    # Smallest border size the recalculation is allowed to set.
    minimum-size: 16.0
    # How often the border is recalculated, in ticks.
    recalculation-interval-ticks: 20
    # Maximum chunks scanned per recalculation pass.
    max-chunks-scanned: 1024

  # -------------------------------------------------------------------------
  # Empty world tick skip
  # -------------------------------------------------------------------------
  # When true, worlds with no players skip almost all tick work. This is the
  # single most effective CPU saver for lobby/minigame networks that keep many
  # worlds loaded but only a few active at a time.
  # -------------------------------------------------------------------------
  disable-tick-when-empty: true

  # -------------------------------------------------------------------------
  # World list
  # -------------------------------------------------------------------------
  # The world list lives in a separate file: worlds.yml inside the folder of
  # the 'file' source (default: plaza_worlds/worlds.yml). Edit it there.

# ---------------------------------------------------------------------------
# Tick control
# ---------------------------------------------------------------------------
# Lobby and minigame servers rarely need vanilla ticking. The flags below let
# you disable whole categories of simulation. All options default to true
# (disabled) because that matches Plaza's performance-first target.
# ---------------------------------------------------------------------------
tick-control:
  # Disables natural mob spawning in all worlds.
  disable-natural-spawning: true
  # Sets noAI on mobs spawned without an explicit AI request.
  disable-mob-ai-by-default: true

  # Fine-grained mob control.
  disable-mob-pathfinding: true
  disable-mob-breeding: true

  # Item and time simulation.
  disable-item-despawn: true
  disable-weather-cycle: true
  disable-daylight-cycle: true

  # Block and plant simulation.
  disable-crop-growth: true
  disable-plant-growth: true
  disable-leaf-decay: true
  disable-fire-spread: true
  disable-lava-flow: true
  disable-water-flow: true

  # Redstone and mechanic ticking.
  disable-redstone-updates: true
  disable-hopper-tick: true
  disable-piston-update: true

  # Server-side particles sent to clients (potion effects, entity effects,
  # enchantment particles, etc.). Disabling saves bandwidth and CPU in lobbies
  # where these visuals are usually irrelevant.
  disable-ambient-particles: true

  # Only runs inventoryTick on the items in main and offhand, not on every
  # stack in the inventory. Safe for most plugins and reduces tick cost with
  # many players carrying full inventories.
  only-tick-items-in-hand: true

  # Lets inactive block entities (furnaces, brewing stands, chests,
  # comparators, etc.) skip ticks until their state changes. Hoppers already
  # have their own Plaza toggle; this covers the rest.
  sleeping-block-entities: true

# ---------------------------------------------------------------------------
# Player tweaks
# ---------------------------------------------------------------------------
# Quality-of-life adjustments for lobby/minigame players.
# ---------------------------------------------------------------------------
player:
  # Keeps food and saturation at default values and ignores exhaustion.
  disable-hunger: true
  # Prevents natural health regeneration from food/saturation.
  disable-health-regeneration: true
  # Prevents experience orbs from merging into larger orbs.
  disable-experience-orb-merge: true
  # Removes the pickup delay on dropped items so they can be collected
  # immediately.
  disable-item-pickup-delay: true

# ---------------------------------------------------------------------------
# Achievements
# ---------------------------------------------------------------------------
# Controls whether advancements and statistics are loaded/tracked.
# Disabling these saves memory and CPU on servers that do not use vanilla
# progression.
# ---------------------------------------------------------------------------
achievements:
  # Skips loading the advancement tree on startup.
  disable-advancement-loading: true
  # Ignores statistic updates and disables loading/saving player stats.
  disable-statistics-tracking: true

# ---------------------------------------------------------------------------
# Physics
# ---------------------------------------------------------------------------
# Physics toggles for entities, falling blocks and TNT.
# ---------------------------------------------------------------------------
physics:
  # Disables gravity for non-player entities (items, mobs, projectiles, etc.).
  # Players keep gravity to avoid movement desync.
  disable-gravity-entities: true
  # Prevents sand, gravel and other fallable blocks from turning into
  # falling-block entities.
  disable-falling-blocks: true
  # Prevents TNT from being primed and freezes any already-primed TNT.
  disable-tnt-physics: true
