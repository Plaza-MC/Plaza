# Plaza - JitPack build configuration.
#
# Plaza is a Paper fork built with paperweight. The patched Paper API sources
# (paper-api/) and the plaza-api Gradle build file are generated by paperweight
# and are NOT committed (see .gitignore), so they must be materialized before
# compiling on a fresh clone such as JitPack's.
#
# Only plaza-api is published on JitPack: plugin developers compile against the
# API, while the server itself is distributed separately as a Paperclip jar
# (see build.sh). $GROUP and $VERSION are provided by JitPack at build time.
#
# Workarounds for JitPack's default image:
# 1. It ships git 2.7.4, which is too old for paperweight (uses options added
#    after 2.17, e.g. --prune-tags, and fails with exit codes 128/129). We
#    install a current git into $HOME without root using micromamba
#    (statically-linked, works on any glibc) and put it first on PATH.
# 2. paperweight commits feature patches with `git am`, which needs a committer
#    identity; we set a global user.name/user.email so the commits succeed.

install:
  - |
    set -euo pipefail
    echo "== os =="; head -n 4 /etc/os-release 2>/dev/null || true
    echo "== system git =="; command -v git; git --version
    echo "== sudo? =="; (sudo -n true 2>/dev/null && echo SUDO_OK) || echo NO_SUDO
    echo "== installing modern git via micromamba =="
    curl -fSL --retry 3 --retry-delay 2 https://micro.mamba.pm/api/micromamba/linux-64/latest | tar -xj bin/micromamba
    ./bin/micromamba create -y -q -p "$HOME/plaza-env" -c conda-forge git
    export PATH="$HOME/plaza-env/bin:$PATH"
    echo "== modern git =="; command -v git; git --version
    echo "== git identity =="; git config --global user.email "jitpack@plazamc.local"; git config --global user.name "JitPack"; git config --global --get-regexp '^user\.'
    # Restore default shell options so they do not leak into JitPack's own
    # buildit.sh (it references unset vars and breaks under `set -u`).
    set +eu; set +o pipefail
  - './gradlew applyPaperPatches --no-configuration-cache && ./gradlew :plaza-api:publishToMavenLocal -Pgroup=$GROUP -Pversion=$VERSION -x test --no-configuration-cache'
