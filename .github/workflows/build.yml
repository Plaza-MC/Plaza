name: Build Plaza

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    if: "github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[CI-SKIP]')"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Configure Git identity
        run: |
          git config --global user.name "PlazaMC CI"
          git config --global user.email "ci@plazamc.org"

      - name: Build distribution jar
        run: ./build.sh

      - name: Create release
        if: "github.event_name == 'push'"
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/plaza-server-*.jar
          tag_name: build-${{ github.sha }}
          name: Plaza ${{ github.sha }}
          draft: false
          prerelease: true
