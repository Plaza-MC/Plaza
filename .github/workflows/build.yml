name: Build Plaza

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Configure Git identity
        run: |
          git config --global user.name "PlazaMC CI"
          git config --global user.email "ci@plazamc.org"

      - name: Build distribution jar
        run: ./build.sh

      - name: Upload Plaza jar
        uses: actions/upload-artifact@v4
        with:
          name: plaza-server-jar
          path: build/libs/plaza-server-*.jar
          if-no-files-found: error
